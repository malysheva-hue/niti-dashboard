id: ORDER_DROP_DETAILED
description: Падение заказов >30% за 7 дней с диагностикой причин (цена, СПП, OOS)
severity_base: 70
applies_to:
  roles: [Локомотив, Маржинальный, Допродажный, База, Новинка]
  require_active: true
triggers:
  - operator: trend
    metric: orders
    window_days: 7
    direction: down
    min_change_pct: -30
diagnostics:
  - operator: price_jump_detected
    metric: price
    window_days: 7
    jump_pct: 5
    add_score: 20
    label: price_grew
  - operator: spp_drop_detected
    metric: spp
    window_days: 7
    threshold_pp: 5
    add_score: 15
    label: spp_lost
  - operator: days_to_zero_with_safety
    metric: stock
    safety_days: 14
    add_score: 10
    label: oos_risk
action_lookup:
  default: order_drop.competitor_pressure
  overrides:
    - if_diagnostics_include: [spp_lost]
      action: order_drop.spp_recovery
    - if_diagnostics_include: [oos_risk]
      action: order_drop.urgent_supply
escalation:
  red_threshold: 85
  yellow_threshold: 60
