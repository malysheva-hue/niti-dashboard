id: MARGIN_ANOMALY
description: Маржа ниже нормы роли или универсального порога 20%
severity_base: 45
applies_to:
  roles: [Локомотив, Маржинальный, Допродажный, База, Новинка]
  require_active: true
triggers:
  - operator: threshold_by_role
    metric: margin
diagnostics:
  - operator: threshold
    metric: margin
    max: 0
    add_score: 60
    label: negative_margin
  - operator: threshold
    metric: margin
    max: 20
    add_score: 20
    label: below_universal
action_lookup:
  default: margin.below_universal
  overrides:
    - if_diagnostics_include: [negative_margin]
      action: margin.negative_urgent
    - if_role_is: [Локомотив]
      action: margin.below_role_lokomotiv
    - if_role_is: [Маржинальный]
      action: margin.below_role_marginal
escalation:
  red_threshold: 80
  yellow_threshold: 60
