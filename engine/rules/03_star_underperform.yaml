id: STAR_UNDERPERFORM
description: Звезда плана отстаёт от целевой траектории
severity_base: 40
applies_to:
  stars_only: true
triggers:
  - operator: trend
    metric: orders
    window_days: 14
    direction: down
    min_change_pct: -20
diagnostics:
  - operator: days_to_zero_with_safety
    metric: stock
    safety_days: 21
    add_score: 20
    label: stock_thin
  - operator: spp_drop_detected
    metric: spp
    window_days: 7
    threshold_pp: 3
    add_score: 15
    label: spp_lost
action_lookup:
  default: star.underperform_demand
escalation:
  red_threshold: 75
  yellow_threshold: 50
