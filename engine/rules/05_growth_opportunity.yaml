id: GROWTH_OPPORTUNITY
description: Точка роста — заказы растут на фоне низкой нагрузки рекламы
severity_base: 40
task_type: opportunity
applies_to:
  roles: [Локомотив, Маржинальный, Новинка, База]
  require_active: true
triggers:
  - operator: trend
    metric: orders
    window_days: 14
    direction: up
    min_change_pct: 30
  - operator: threshold
    metric: tacos
    min: 3     # matched, если tacos<3 (низкая нагрузка рекламы)
diagnostics:
  - operator: threshold
    metric: margin
    max: 25    # matched, если margin>25 (есть запас)
    add_score: 10
    label: margin_capacity
action_lookup:
  default: growth.activate_paid
  overrides:
    - if_diagnostics_include: [margin_capacity]
      action: growth.scale_up
escalation:
  red_threshold: 999
  yellow_threshold: 0
