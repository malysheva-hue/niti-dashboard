id: PRICE_COMPETITOR
description: Скачок цены вверх или потеря СПП на фоне падения заказов
severity_base: 55
applies_to:
  roles: [Локомотив, Маржинальный, Допродажный, База]
  require_active: true
triggers:
  - operator: price_jump_detected
    metric: price
    window_days: 7
    jump_pct: 10
  - operator: spp_drop_detected
    metric: spp
    window_days: 7
    threshold_pp: 5
    or_trigger: true
diagnostics:
  - operator: trend
    metric: orders
    window_days: 7
    direction: down
    min_change_pct: -15
    add_score: 25
    label: orders_dropping
action_lookup:
  default: price.investigate_competitor
escalation:
  red_threshold: 85
  yellow_threshold: 60
