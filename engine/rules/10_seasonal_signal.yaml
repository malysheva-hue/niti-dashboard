id: SEASONAL_SIGNAL
description: Сезонная категория показывает аномалию относительно ожидаемой фазы
severity_base: 35
applies_to:
  seasonal_only: true
  require_active: true
triggers:
  - operator: trend
    metric: orders
    window_days: 14
    direction: any
    min_change_pct: 25
diagnostics:
  - operator: trend
    metric: orders
    window_days: 14
    direction: up
    min_change_pct: 30
    add_score: 15
    label: peak_strong
  - operator: trend
    metric: orders
    window_days: 14
    direction: down
    min_change_pct: -30
    add_score: 25
    label: peak_weak
action_lookup:
  default: seasonal.boost_peak
  overrides:
    - if_diagnostics_include: [peak_weak]
      action: seasonal.miss_peak
escalation:
  red_threshold: 80
  yellow_threshold: 50
