id: HIGH_TURNOVER_LOW_PRICE
description: Товар уходит за <20 дней при сниженной цене — можно вернуть цену
severity_base: 50
task_type: opportunity
applies_to:
  roles: [Локомотив, Маржинальный, База, Допродажный]
  require_active: true
triggers:
  - operator: threshold
    metric: turnover
    min: 20       # matched, если turnover<20 (быстро уходит)
  - operator: trend
    metric: price
    window_days: 7
    direction: down
    min_change_pct: -5
diagnostics:
  - operator: threshold
    metric: margin
    max: 30       # matched при margin>30 — есть запас на возврат цены
    add_score: 15
    label: high_margin_capacity
action_lookup:
  default: high_turnover.raise_price
escalation:
  red_threshold: 999
  yellow_threshold: 0
