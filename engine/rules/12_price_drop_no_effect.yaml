id: PRICE_DROP_NO_EFFECT
description: Цена снижена за 7 дней, но заказы не выросли — причина за пределами нашего рычага
severity_base: 50
applies_to:
  roles: [Локомотив, Маржинальный, Допродажный, База]
  require_active: true
triggers:
  - operator: trend
    metric: price
    window_days: 7
    direction: down
    min_change_pct: -5
  - operator: trend
    metric: orders
    window_days: 7
    direction: down       # снизили, но заказы не выросли — даже падают
    min_change_pct: 0     # порог в 0 → matched когда заказы upward не идут
diagnostics: []
action_lookup:
  default: price_drop_no_effect
escalation:
  red_threshold: 80
  yellow_threshold: 50
