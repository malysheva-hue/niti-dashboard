id: ORDERS_DROP_1D
description: Заказы упали >50% за один день при стабильной цене
severity_base: 50
applies_to:
  roles: [Локомотив, Маржинальный, Допродажный, База, Новинка]
  require_active: true
triggers:
  - operator: single_day_change
    metric: orders
    delta_type: pct
    direction: down
    threshold: 50
diagnostics:
  - operator: single_day_change
    metric: price
    delta_type: pct
    direction: any
    threshold: 5
    add_score: -20   # если цена тоже скакала — снижаем приоритет, это не аномалия
    label: price_also_moved
action_lookup:
  default: order_drop.competitor_pressure
escalation:
  red_threshold: 80
  yellow_threshold: 50
