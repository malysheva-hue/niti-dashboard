id: DRR_JUMP_1D
description: ДРР вырос >5 пп за один день
severity_base: 45
applies_to:
  roles: [Локомотив, Маржинальный, Допродажный, База, Новинка]
  require_active: true
triggers:
  - operator: single_day_change
    metric: drr
    delta_type: pp
    direction: up
    threshold: 5
diagnostics: []
action_lookup:
  default: drr.runaway
escalation:
  red_threshold: 80
  yellow_threshold: 45
